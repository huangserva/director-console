.caption-line span, .caption span { color: #fff; font-size: 30px; font-style: italic; font-weight: 950; line-height: 1.18; paint-order: stroke fill; text-shadow: 0 3px 0 #070809, 0 0 14px rgba(0,0,0,.8); -webkit-text-stroke: 4px #070809; }

    </style>
  </head>
  <body>
    <div id="root" data-composition-id="sample-text" data-start="0" data-duration="12" data-width="1920" data-height="1080">
      

      <div id="sample-title" class="clip scene title-scene" data-memos-scene="sample-title" data-start="0.000" data-duration="4.000" data-track-index="10">
        <div class="corner-left">导演</div>
        <div class="corner-name">样例</div>
        <div class="title-block">
          <div class="title-kicker">可编辑方案</div>
          <div class="main-title">纯文本预览</div>
          <div class="title-sub">无需外部媒体素材</div>
        </div>
        <div class="underline-stack"><i></i><i></i></div>
      </div>

      <div id="sample-steps" class="clip scene step-scene" data-memos-scene="sample-steps" data-start="4.000" data-duration="4.000" data-track-index="20">
        <div class="step-wrap">
          <div class="step-panel">
            <div class="step-kicker">步骤 01</div>
            <div class="step-title">编辑属性</div>
            <div class="step-list"><div class="step-item">加载方案</div><div class="step-item">修改文案</div><div class="step-item">重新合成</div></div>
          </div>
        </div>
      </div>

      <div id="sample-close" class="clip scene title-scene" data-memos-scene="sample-close" data-start="8.000" data-duration="4.000" data-track-index="30">
        <div class="corner-left">预览</div>
        <div class="corner-name">控制台</div>
        <div class="title-block">
          <div class="title-kicker">网页壳已就绪</div>
          <div class="main-title">实时网页输出</div>
          <div class="title-sub">用于 M0 演示</div>
        </div>
        <div class="underline-stack"><i></i><i></i></div>
      </div>

    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      function screenTimeline(id, scanId, start, panDuration) {
        tl.from("#" + scanId, { left: 1810, opacity: 0, duration: 0.36, ease: "power2.inOut" }, start - 0.22);
        tl.to("#" + scanId, { opacity: 0, duration: 0.08, ease: "power1.out" }, start + 0.18);
        tl.from("#" + id + " .screen-shell", { opacity: 0, x: -120, scale: 0.97, duration: 0.42, ease: "power3.out" }, start);
        tl.from("#" + id + " .screen-label", { opacity: 0, x: -18, duration: 0.20, ease: "power2.out" }, start + 0.26);
        tl.from("#" + id + " .circle-pip", { opacity: 0, scale: 0.70, duration: 0.30, ease: "back.out(1.7)" }, start + 0.42);
        tl.to("#" + id + " .screen-shell", { x: 18, scale: 1.01, duration: panDuration, ease: "none" }, start + 0.90);
      }
      tl.from("#sample-steps .step-panel", { opacity: 0, y: 34, scale: 0.96, duration: 0.42, ease: "power3.out" }, 4.000);
      tl.from("#sample-steps .step-kicker", { opacity: 0, x: -18, duration: 0.18, ease: "power2.out" }, 4.270);
      tl.from("#sample-steps .step-title", { opacity: 0, y: 24, duration: 0.30, ease: "power2.out" }, 4.450);
      tl.from("#sample-steps .step-item", { opacity: 0, y: 18, stagger: 0.09, duration: 0.22, ease: "power2.out" }, 4.890);
      window.__timelines["sample-text"] = tl;
    </script>
  </body>
</html>
